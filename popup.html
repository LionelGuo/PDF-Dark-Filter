<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: sans-serif;
    }
    .control-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }
    input[type="color"] {
      width: 100%;
      height: 30px;
      border: none;
      cursor: pointer;
    }
    .status {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h3>PDF Filter</h3>
  <div class="control-group">
    <label for="bgColor">Background Color:</label>
    <input type="color" id="bgColor" value="#d3d3d3">
  </div>
  <div class="control-group">
    <label>
      <input type="checkbox" id="enabled" checked> Enable Filter
    </label>
  </div>
  <div class="control-group">
    <label>
      <input type="checkbox" id="localOnly"> Only for local files
    </label>
  </div>
  <div class="control-group">
    <label>
      <input type="checkbox" id="paperTexture"> Paper Texture
    </label>
  </div>
  <div class="control-group" id="textureIntensityGroup">
    <label for="textureIntensity">Texture Intensity:</label>
    <input type="range" id="textureIntensity" min="0" max="100" value="25">
  </div>
  <div class="control-group" id="textureScaleGroup">
    <label for="textureScale">Texture Scale:</label>
    <input type="range" id="textureScale" min="10" max="200" value="100">
  </div>
  <p class="status">Note: Refresh the PDF page after changing settings.</p>
  <script src="popup.js"></script>
</body>
</html>
